<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
.modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    z-index: 999;
}

/* Khung video */
.modal-content {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
}

/* Video tự fit màn hình */
.modal-content video {
    max-width: 90vw;
    max-height: 85vh;
    border-radius: 10px;
}

/* Nút đóng */
.close {
    position: absolute;
    top: -15px;
    right: -15px;
    background: red;
    color: white;
    border: none;
    width: 35px;
    height: 35px;
    border-radius: 50%;
    font-size: 18px;
    cursor: pointer;
}
</style>
</head>
<body>
<h1>Chó bảo nam!</h1>
<!-- 7 BUTTON -->
<button onclick="openVideo('bida.mp4')">▶ BiDa</button>
<button onclick="openVideo('el.mp4')">▶ Chích điện </button>
<button onclick="openVideo('fire.mp4')">▶ Cháy🔥</button>
<button onclick="openVideo('tw.mp4')">▶ Hữu duyên BC</button>
<button onclick="openVideo('bl.mp4')">▶ Hữu duyên BL</button>
<button onclick="openVideo('ronaldo.mp4')">▶ Ronaldoooooooo ⚽ </button>
<button onclick="openVideo('abcd.mp4')">▶ Chích kèn</button>

<!-- 1 POPUP DUY NHẤT -->
<div id="modal" class="modal">
    <div class="modal-content">
        <button class="close" onclick="closeVideo()">×</button>
        <video id="player" controls></video>
    </div>
</div>

<script>
let modal = document.getElementById("modal");
let player = document.getElementById("player");

function openVideo(src) {
    player.src = src;
    modal.style.display = "block";
    player.play();
}

function closeVideo() {
    modal.style.display = "none";
    player.pause();
    player.src = "";
}

/* click ngoài để tắt */
window.onclick = function(e) {
    if (e.target === modal) {
        closeVideo();
    }
}
</script>

</body>
</html>
